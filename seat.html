<!DOCTYPE html>
<html>
<head>
    <title>Select Seats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Select Your Seats 💺</h1>

<div id="seats" style="text-align:center;"></div>

<div style="text-align:center; margin-top:20px;">
    <button onclick="confirmBooking()">Confirm Booking</button>
</div>

<script>
let selected = 0;


let max = parseInt(localStorage.getItem("seats")) || 1;

for(let i=1;i<=20;i++){
    let btn = document.createElement("button");
    btn.innerText = i;

    btn.style.margin = "5px";
    btn.style.padding = "10px";

    btn.onclick = function(){
        if(btn.classList.contains("selected")){
            btn.classList.remove("selected");
            btn.style.background = "";
            selected--;
        } 
        else {
            if(selected < max){
                btn.classList.add("selected");
                btn.style.background = "green";
                btn.style.color = "white";
                selected++;
            } else {
                alert("You can select only " + max + " seats");
            }
        }
    };

    document.getElementById("seats").appendChild(btn);
}


   function confirmBooking(){
    if(selected == 0){
        alert("Select at least 1 seat");
        return;
    }

    // 👉 selected seats store pannuvom
    localStorage.setItem("selectedSeats", selected);

    window.location.href = "ticket.html";
}
</script>

</body>
</html>
